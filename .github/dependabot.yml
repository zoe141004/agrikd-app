# Dependabot disabled — project uses pinned dependency versions.
# Automatic version bumps cause breaking changes across Flutter, npm, pip
# and GitHub Actions ecosystems. Dependencies will be upgraded manually
# when needed after thorough testing.
version: 2
updates:
  # npm (admin dashboard)
  - package-ecosystem: "npm"
    directory: "/admin-dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"

  # pip (MLOps pipeline)
  - package-ecosystem: "pip"
    directory: "/mlops_pipeline"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"

  # Flutter / Dart (mobile app)
  - package-ecosystem: "pub"
    directory: "/mobile_app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
