name: Validate Model
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to validate (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements-evaluate.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gs
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull DVC data
        run: |
          DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"
          for attempt in 1 2 3; do
            if dvc pull "$DVC_FILE"; then break; fi
            [ "$attempt" -eq 3 ] && exit 1
            sleep 10
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Cleanup DVC credentials
        if: always()
        run: |
          rm -f ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock
          unset GOOGLE_APPLICATION_CREDENTIALS_DATA 2>/dev/null || true

      - name: Run validation
        run: python mlops_pipeline/scripts/validate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Run evaluation
        run: python mlops_pipeline/scripts/evaluate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: validation-${{ inputs.leaf_type }}
          path: models/${{ inputs.leaf_type }}/
