name: Validate Model
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to validate (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r mlops_pipeline/requirements.txt

      - name: Pull DVC data
        run: |
          pip install dvc dvc-gdrive
          dvc pull data/${{ inputs.leaf_type }}.dvc || echo "DVC pull skipped (no tracked data or credentials)"
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Run validation
        run: python mlops_pipeline/scripts/validate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: Run evaluation
        run: python mlops_pipeline/scripts/evaluate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ inputs.leaf_type }}
          path: models/${{ inputs.leaf_type }}/
