name: Validate Model
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to validate (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements-evaluate.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gdrive
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull DVC data
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          DVC_FILE="data_${LEAF_TYPE}.dvc"
          for attempt in 1 2 3; do
            if dvc pull "$DVC_FILE"; then break; fi
            [ "$attempt" -eq 3 ] && exit 1
            sleep 10
          done
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Run validation
        run: python mlops_pipeline/scripts/validate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Run evaluation
        run: python mlops_pipeline/scripts/evaluate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-${{ inputs.leaf_type }}
          path: models/${{ inputs.leaf_type }}/
