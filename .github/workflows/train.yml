name: Trigger Training
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to train (e.g. tomato, burmese_grape_leaf)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: read

concurrency:
  group: train-${{ inputs.leaf_type || 'all' }}
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements-evaluate.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gs
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull training data via DVC
        run: |
          for attempt in 1 2 3; do
            echo "DVC pull attempt $attempt/3..."
            if dvc pull; then
              echo "DVC pull succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "[ERROR] DVC pull failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}

      - name: Cleanup DVC credentials
        if: always()
        run: |
          rm -f ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock
          unset GOOGLE_APPLICATION_CREDENTIALS_DATA 2>/dev/null || true

      - name: Run training pipeline
        run: |
          if [ "$LEAF_TYPE" = "all" ]; then
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/tomato.json
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/burmese_grape_leaf.json
          else
            python mlops_pipeline/scripts/run_pipeline.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Upload trained models
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: trained-models
          path: models/
