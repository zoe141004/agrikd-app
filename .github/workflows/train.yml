name: Trigger Training
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to train (e.g. tomato, burmese_grape_leaf)'
        required: false
        default: 'all'
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r mlops_pipeline/requirements.txt

      - name: Pull training data via DVC
        run: |
          pip install dvc dvc-gdrive
          dvc pull || echo "DVC pull skipped"
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Run training pipeline
        run: |
          if [ "${{ inputs.leaf_type }}" = "all" ]; then
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/tomato.json
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/burmese_grape_leaf.json
          else
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json
          fi

      - name: Upload trained models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
