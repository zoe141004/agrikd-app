name: Trigger Training
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to train (e.g. tomato, burmese_grape_leaf)'
        required: false
        default: 'all'
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements-evaluate.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gdrive
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull training data via DVC
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          for attempt in 1 2 3; do
            echo "DVC pull attempt $attempt/3..."
            if dvc pull; then
              echo "DVC pull succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "[ERROR] DVC pull failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Run training pipeline
        run: |
          if [ "$LEAF_TYPE" = "all" ]; then
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/tomato.json
            python mlops_pipeline/scripts/run_pipeline.py --config mlops_pipeline/configs/burmese_grape_leaf.json
          else
            python mlops_pipeline/scripts/run_pipeline.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Upload trained models
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trained-models
          path: models/
