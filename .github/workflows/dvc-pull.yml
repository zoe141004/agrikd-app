name: DVC Pull
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Specific leaf type to pull (leave empty for all)'
        required: false
        type: string
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  dvc-pull:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install dvc dvc-gdrive

      - name: Report status — pulling
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"pulling\",\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: DVC Pull
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          if [ -n "$LEAF_TYPE" ]; then
            DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"
            if [ ! -f "$DVC_FILE" ]; then
              echo "[ERROR] DVC file not found: $DVC_FILE"
              ls -la dvc/*.dvc 2>/dev/null || echo "No .dvc files in dvc/"
              exit 1
            fi
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull "$DVC_FILE" -v; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              sleep 10
            done
          else
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull -v; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              sleep 10
            done
          fi
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Report dataset info
        run: |
          echo "## Dataset Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Dataset | Classes | Files | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in data/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              classes=$(ls -d "$dir"*/ 2>/dev/null | wc -l)
              files=$(find "$dir" -type f | wc -l)
              size=$(du -sh "$dir" | cut -f1)
              echo "| $name | $classes | $files | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Report status — completed
        if: inputs.dvc_operation_id != '' && success()
        continue-on-error: true
        run: |
          # Build rich metadata JSON with per-dataset, per-class breakdown
          python3 -c "
          import json, os, glob

          datasets = {}
          total_files = 0
          total_size = 0

          for data_dir in sorted(glob.glob('data/*/')):
              if not os.path.isdir(data_dir):
                  continue
              ds_name = os.path.basename(data_dir.rstrip('/'))
              # Skip non-dataset dirs (exports, staging, etc.)
              classes = {}
              ds_files = 0
              ds_size = 0
              for cls_dir in sorted(glob.glob(os.path.join(data_dir, '*/'))):
                  if not os.path.isdir(cls_dir):
                      continue
                  cls_name = os.path.basename(cls_dir.rstrip('/'))
                  imgs = [f for f in os.listdir(cls_dir)
                          if f.lower().endswith(('.jpg','.jpeg','.png','.bmp','.webp','.tiff'))]
                  cls_size = sum(os.path.getsize(os.path.join(cls_dir, f)) for f in imgs)
                  classes[cls_name] = {'count': len(imgs), 'size': cls_size}
                  ds_files += len(imgs)
                  ds_size += cls_size
              if not classes:
                  continue
              # Read DVC file hash if exists
              dvc_file = f'dvc/data_{ds_name}.dvc'
              dvc_md5 = ''
              if os.path.exists(dvc_file):
                  with open(dvc_file) as f:
                      for line in f:
                          if line.strip().startswith('md5:'):
                              dvc_md5 = line.strip().split(':', 1)[1].strip()
                              break
              datasets[ds_name] = {
                  'file_count': ds_files,
                  'total_size': ds_size,
                  'num_classes': len(classes),
                  'classes': classes,
                  'dvc_md5': dvc_md5
              }
              total_files += ds_files
              total_size += ds_size

          metadata = {
              'file_count': total_files,
              'total_size': total_size,
              'datasets': datasets
          }
          with open('/tmp/metadata.json', 'w') as f:
              json.dump(metadata, f)
          "

          METADATA=$(cat /tmp/metadata.json)
          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Merge status + completed_at into metadata payload
          PAYLOAD=$(python3 -c "
          import json, sys
          m = json.load(open('/tmp/metadata.json'))
          print(json.dumps({'status':'completed','completed_at':'$COMPLETED_AT','metadata':m}))
          ")
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PAYLOAD"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"DVC pull failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
