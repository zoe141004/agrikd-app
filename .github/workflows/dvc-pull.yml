name: DVC Pull
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Specific leaf type to pull (leave empty for all)'
        required: false
        type: string
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

jobs:
  dvc-pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install dvc dvc-gdrive

      - name: Report status — pulling
        if: inputs.dvc_operation_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"pulling\",\"github_run_id\":${{ github.run_id }},\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: DVC Pull
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          if [ -n "$LEAF_TYPE" ]; then
            DVC_FILE="data_${LEAF_TYPE}.dvc"
            if [ ! -f "$DVC_FILE" ]; then
              echo "[ERROR] DVC file not found: $DVC_FILE"
              ls -la *.dvc 2>/dev/null || echo "No .dvc files at root"
              exit 1
            fi
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull "$DVC_FILE" -v; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              sleep 10
            done
          else
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull -v; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              sleep 10
            done
          fi
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Report dataset info
        run: |
          echo "## Dataset Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Dataset | Classes | Files | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          for dir in data/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              classes=$(ls -d "$dir"*/ 2>/dev/null | wc -l)
              files=$(find "$dir" -type f | wc -l)
              size=$(du -sh "$dir" | cut -f1)
              echo "| $name | $classes | $files | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Report status — completed
        if: inputs.dvc_operation_id != ''
        run: |
          # Collect metadata from pulled datasets
          METADATA="{}"
          TOTAL_FILES=0
          TOTAL_SIZE=0
          for dir in data/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              files=$(find "$dir" -type f | wc -l)
              size=$(du -sb "$dir" | cut -f1)
              TOTAL_FILES=$((TOTAL_FILES + files))
              TOTAL_SIZE=$((TOTAL_SIZE + size))
            fi
          done
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"completed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"metadata\":{\"file_count\":$TOTAL_FILES,\"total_size\":$TOTAL_SIZE}}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"DVC pull failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
