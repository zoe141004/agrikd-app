name: Export Data to DVC
on:
  workflow_dispatch:
    inputs:
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: export-data
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install dvc dvc-gdrive requests

      - name: Report status — exporting
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"exporting\",\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Export predictions from Supabase
        run: |
          python -c "
          import requests, json, os, sys
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          headers = {'apikey': key, 'Authorization': f'Bearer {key}'}
          offset, all_rows = 0, []
          while True:
              resp = requests.get(f'{url}/rest/v1/predictions?select=id,leaf_type,predicted_class_name,confidence,model_version,created_at&order=created_at.desc&offset={offset}&limit=1000', headers=headers, timeout=30)
              if resp.status_code != 200:
                  print(f'API error: {resp.status_code} - {resp.text[:200]}')
                  sys.exit(1)
              rows = resp.json()
              if not rows: break
              all_rows.extend(rows)
              offset += 1000
              if len(rows) < 1000: break
          os.makedirs('data/exports', exist_ok=True)
          with open('data/exports/predictions_snapshot.json', 'w') as f:
              json.dump(all_rows, f, indent=2)
          print(f'Exported {len(all_rows)} predictions')
          "

      - name: DVC add and push
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          dvc add data/exports/predictions_snapshot.json
          dvc push
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Cleanup DVC credentials
        if: always()
        run: |
          rm -f ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock
          unset GDRIVE_CREDENTIALS_DATA 2>/dev/null || true

      - name: Commit DVC tracking file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exports/*.dvc data/exports/.gitignore
          git diff --cached --quiet || git commit -m "chore: update exported predictions snapshot"
          git push || { echo "::error::git push failed"; exit 1; }

      - name: Report status — completed
        if: inputs.dvc_operation_id != '' && success()
        continue-on-error: true
        run: |
          SIZE=$(stat -c%s data/exports/predictions_snapshot.json 2>/dev/null || echo "0")
          ROWS=$(python3 -c "import json; print(len(json.load(open('data/exports/predictions_snapshot.json'))))" 2>/dev/null || echo "0")
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$(printf '{"status":"completed","completed_at":"%s","metadata":{"file_count":1,"total_size":%d,"rows_exported":%d}}' \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIZE" "$ROWS")"
        env:
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"Export data failed — check GitHub Actions logs\"}"
        env:
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
