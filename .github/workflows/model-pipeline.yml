name: Model Pipeline (Convert + Validate + Evaluate)
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string
      version:
        description: 'Model version (e.g. 1.1.0)'
        required: true
        type: string
      model_url:
        description: 'Supabase Storage URL of the uploaded .pth checkpoint'
        required: true
        type: string
      min_accuracy:
        description: 'Minimum accuracy threshold (%) for quality gate'
        required: false
        type: number
        default: 80
      pipeline_run_id:
        description: 'Pipeline run ID for status tracking (from pipeline_runs table)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: model-build-${{ inputs.leaf_type }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            mlops_pipeline/requirements-evaluate.txt
            mlops_pipeline/requirements-convert.txt

      - name: Cache DVC data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: data
          key: dvc-${{ inputs.leaf_type }}-${{ hashFiles(format('dvc/data_{0}.dvc', inputs.leaf_type)) }}
          restore-keys: |
            dvc-${{ inputs.leaf_type }}-

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gs
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Setup GCS credentials
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_DATA" > /tmp/gcs-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-sa.json" >> $GITHUB_ENV
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}

      - name: Pull DVC test data
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          if [ -d "$DATA_DIR" ] && [ "$(find "$DATA_DIR" -type f | wc -l)" -gt 10 ]; then
            echo "[CACHE HIT] Test data already present: $(find "$DATA_DIR" -type f | wc -l) files"
          else
            echo "[CACHE MISS] Pulling test data via DVC..."
            DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"
            if [ ! -f "$DVC_FILE" ]; then
              echo "[ERROR] DVC file not found: $DVC_FILE"
              ls -la dvc/*.dvc 2>/dev/null || echo "No .dvc files in dvc/"
              exit 1
            fi
            echo "Found DVC file: $DVC_FILE"
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull "$DVC_FILE"; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              echo "Retrying in 10s..."
              sleep 10
            done
          fi
          echo "Test data: $(find "data/${LEAF_TYPE}" -type f | wc -l) files"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Cleanup GCS credentials
        if: always()
        run: |
          rm -f /tmp/gcs-sa.json ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock

      - name: Download .pth checkpoint
        run: |
          echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
          echo "::add-mask::$SUPABASE_URL"
          python .github/scripts/download_checkpoint.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MODEL_URL_INPUT: ${{ inputs.model_url }}
          LEAF_TYPE: ${{ inputs.leaf_type }}
          VERSION: ${{ inputs.version }}

      - name: Update pipeline status — converting
        if: inputs.pipeline_run_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/pipeline_runs?id=eq.$PIPELINE_RUN_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"converting\",\"github_run_id\":$GH_RUN_ID,\"github_run_url\":\"$GH_RUN_URL\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_RUN_ID: ${{ inputs.pipeline_run_id }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 'Convert PTH → ONNX'
        id: convert_onnx
        run: python mlops_pipeline/scripts/convert_pth_to_onnx.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: 'Convert ONNX → TFLite'
        id: convert_tflite
        run: python mlops_pipeline/scripts/convert_onnx_to_tflite.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: 'Cross-format validation'
        id: validation
        run: python mlops_pipeline/scripts/validate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Update pipeline status — evaluating
        if: inputs.pipeline_run_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/pipeline_runs?id=eq.$PIPELINE_RUN_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"status":"evaluating"}'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_RUN_ID: ${{ inputs.pipeline_run_id }}

      - name: 'Full evaluation on real test data'
        id: evaluate
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "[ERROR] Test data not found at $DATA_DIR"
            exit 1
          fi
          echo "Test data: $(ls "$DATA_DIR" | wc -l) class folders"
          python mlops_pipeline/scripts/evaluate_models.py --config "mlops_pipeline/configs/${LEAF_TYPE}.json"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Quality Gate
        id: quality_gate
        run: |
          python3 << 'PYEOF'
          import re, sys, os

          report_path = os.environ["REPORT_PATH"]
          min_acc = float(os.environ["MIN_ACC"])

          if not os.path.exists(report_path):
              print(f"::error::QUALITY GATE FAILED: Benchmark report not found at {report_path}")
              sys.exit(1)

          with open(report_path) as f:
              content = f.read()

          # Parse the Benchmark Summary markdown table
          table_match = re.search(
              r'### Benchmark Summary\s+\|(.+?)\n\|[-\s|]+\n((?:\|.+\n)+)',
              content, re.DOTALL
          )
          if not table_match:
              print("::error::QUALITY GATE FAILED: Could not parse Benchmark Summary table")
              sys.exit(1)

          headers = [h.strip() for h in table_match.group(1).split('|') if h.strip()]
          rows = table_match.group(2).strip().split('\n')

          # Find accuracy column (handles both "Accuracy (%)" and "Top-1 %" headers)
          acc_idx = None
          for i, h in enumerate(headers):
              hl = h.lower()
              if 'accuracy' in hl or 'top-1' in hl:
                  acc_idx = i
                  break

          if acc_idx is None:
              print(f"::error::QUALITY GATE FAILED: No accuracy column found. Headers: {headers}")
              sys.exit(1)

          # Extract accuracy for each model format
          accuracies = {}
          for row in rows:
              cells = [c.strip() for c in row.split('|') if c.strip()]
              if len(cells) <= acc_idx:
                  continue
              fmt = cells[0]
              try:
                  acc = float(cells[acc_idx])
                  accuracies[fmt] = acc
              except ValueError:
                  continue

          if not accuracies:
              print("::error::QUALITY GATE FAILED: No accuracy values found in report")
              sys.exit(1)

          # Primary check target: TFLite (float16) — the mobile deployment format
          target_fmt = None
          target_acc = None
          for fmt, acc in accuracies.items():
              if 'tflite' in fmt.lower() and 'float16' in fmt.lower():
                  target_fmt = fmt
                  target_acc = acc
                  break

          # Fallback: use the lowest accuracy across all formats
          if target_acc is None:
              target_fmt = min(accuracies, key=accuracies.get)
              target_acc = accuracies[target_fmt]

          print("Benchmark accuracies:")
          for fmt, acc in accuracies.items():
              marker = "  <<< [CHECK TARGET]" if fmt == target_fmt else ""
              print(f"  {fmt}: {acc:.1f}%{marker}")

          print(f"\nQuality gate threshold: {min_acc}%")
          print(f"Target format: {target_fmt}")
          print(f"Target accuracy: {target_acc:.1f}%")

          if target_acc < min_acc:
              print(f"\n::error::QUALITY GATE FAILED: {target_fmt} accuracy {target_acc:.1f}% is below minimum threshold {min_acc}%")
              sys.exit(1)

          print(f"\nQUALITY GATE PASSED: {target_fmt} accuracy {target_acc:.1f}% >= {min_acc}% threshold")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"accuracy={target_acc}\n")
              f.write(f"format={target_fmt}\n")
          PYEOF
        env:
          REPORT_PATH: models/${{ inputs.leaf_type }}/benchmark_report.md
          MIN_ACC: ${{ inputs.min_accuracy }}

      - name: Cleanup intermediate files (keep .pth + .onnx + .tflite float16)
        if: always()
        run: |
          BASE="models/${LEAF_TYPE}"
          echo "Cleaning up TFLite float32 (metrics already extracted)..."
          rm -f "${BASE}/${LEAF_TYPE}_student_float32.tflite"
          echo "[OK] Cleaned intermediate files. Remaining:"
          ls -la "${BASE}/" || true
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Compute SHA-256 of TFLite float16 model
        id: sha256
        run: |
          TFLITE_PATH="models/${LEAF_TYPE}/${LEAF_TYPE}_student_float16.tflite"
          if [ -f "$TFLITE_PATH" ]; then
            HASH=$(sha256sum "$TFLITE_PATH" | awk '{print $1}')
            SIZE_MB=$(python3 -c "import os; print(f'{os.path.getsize(\"$TFLITE_PATH\") / 1048576:.3f}')")
            echo "hash_float16=$HASH" >> "$GITHUB_OUTPUT"
            echo "size_mb_float16=$SIZE_MB" >> "$GITHUB_OUTPUT"
            echo "[OK] float16 SHA-256: $HASH  Size: ${SIZE_MB} MB"
          else
            echo "[ERROR] TFLite float16 not found: $TFLITE_PATH"
            echo "hash_float16=" >> "$GITHUB_OUTPUT"
            echo "size_mb_float16=" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          ONNX_PATH="models/${LEAF_TYPE}/${LEAF_TYPE}_student.onnx"
          if [ -f "$ONNX_PATH" ]; then
            ONNX_HASH=$(sha256sum "$ONNX_PATH" | awk '{print $1}')
            echo "hash_onnx=$ONNX_HASH" >> "$GITHUB_OUTPUT"
            echo "[OK] ONNX SHA-256: $ONNX_HASH"
          else
            echo "[WARN] ONNX not found: $ONNX_PATH"
            echo "hash_onnx=" >> "$GITHUB_OUTPUT"
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Upload results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEAF_TYPE: ${{ inputs.leaf_type }}
          VERSION: ${{ inputs.version }}
          TFLITE_FLOAT16_SHA256: ${{ steps.sha256.outputs.hash_float16 }}
          ONNX_SHA256: ${{ steps.sha256.outputs.hash_onnx }}
          PIPELINE_RUN_ID: ${{ inputs.pipeline_run_id }}
        run: python .github/scripts/upload_benchmarks.py

      - name: Update pipeline status — failed
        if: failure() && inputs.pipeline_run_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/pipeline_runs?id=eq.$PIPELINE_RUN_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"Pipeline failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_RUN_ID: ${{ inputs.pipeline_run_id }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pipeline-${{ inputs.leaf_type }}-v${{ inputs.version }}
          path: models/${{ inputs.leaf_type }}/
