name: Model Pipeline (Convert + Validate + Evaluate)
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string
      version:
        description: 'Model version (e.g. 1.1.0)'
        required: true
        type: string
      model_url:
        description: 'Supabase Storage URL of the uploaded .pth checkpoint'
        required: true
        type: string

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: mlops_pipeline/requirements-evaluate.txt

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gdrive
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull DVC test data
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          DVC_FILE="data_${{ inputs.leaf_type }}.dvc"
          if [ ! -f "$DVC_FILE" ]; then
            echo "[ERROR] DVC file not found: $DVC_FILE"
            ls -la *.dvc 2>/dev/null || echo "No .dvc files at root"
            exit 1
          fi
          echo "Found DVC file: $DVC_FILE"
          for attempt in 1 2 3; do
            echo "DVC pull attempt $attempt/3..."
            if dvc pull "$DVC_FILE"; then
              echo "DVC pull succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "[ERROR] DVC pull failed after 3 attempts"
              exit 1
            fi
            echo "Retrying in 10s..."
            sleep 10
          done
          echo "Test data: $(find data/${{ inputs.leaf_type }} -type f | wc -l) files"
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Download .pth checkpoint
        run: |
          mkdir -p model_checkpoints_student
          curl -fSL -o "model_checkpoints_student/${{ inputs.leaf_type }}_student.pth" "${{ inputs.model_url }}"
          ls -lh "model_checkpoints_student/${{ inputs.leaf_type }}_student.pth"

      - name: 'Convert PTH → ONNX'
        run: python mlops_pipeline/scripts/convert_pth_to_onnx.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: 'Convert ONNX → TFLite'
        run: python mlops_pipeline/scripts/convert_onnx_to_tflite.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: 'Cross-format validation'
        run: python mlops_pipeline/scripts/validate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json
        continue-on-error: true

      - name: 'Full evaluation on real test data'
        run: |
          DATA_DIR="data/${{ inputs.leaf_type }}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "[ERROR] Test data not found at $DATA_DIR"
            exit 1
          fi
          echo "Test data: $(ls "$DATA_DIR" | wc -l) class folders"
          python mlops_pipeline/scripts/evaluate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: Compute SHA-256 of TFLite model
        id: sha256
        run: |
          TFLITE_PATH="models/${{ inputs.leaf_type }}/${{ inputs.leaf_type }}_student.tflite"
          if [ -f "$TFLITE_PATH" ]; then
            HASH=$(sha256sum "$TFLITE_PATH" | awk '{print $1}')
            SIZE_MB=$(python3 -c "import os; print(f'{os.path.getsize(\"$TFLITE_PATH\") / 1048576:.3f}')")
            echo "hash=$HASH" >> "$GITHUB_OUTPUT"
            echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
            echo "[OK] SHA-256: $HASH  Size: ${SIZE_MB} MB"
          else
            echo "[WARN] TFLite file not found: $TFLITE_PATH"
            echo "hash=" >> "$GITHUB_OUTPUT"
            echo "size_mb=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEAF_TYPE: ${{ inputs.leaf_type }}
          VERSION: ${{ inputs.version }}
          TFLITE_SHA256: ${{ steps.sha256.outputs.hash }}
          TFLITE_SIZE_MB: ${{ steps.sha256.outputs.size_mb }}
        run: python .github/scripts/upload_benchmarks.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ inputs.leaf_type }}-v${{ inputs.version }}
          path: models/${{ inputs.leaf_type }}/
