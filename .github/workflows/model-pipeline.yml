name: Model Pipeline (Convert + Validate + Evaluate)
on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type (e.g. tomato, burmese_grape_leaf)'
        required: true
        type: string
      version:
        description: 'Model version (e.g. 1.1.0)'
        required: true
        type: string
      model_url:
        description: 'Supabase Storage URL of the uploaded .pth checkpoint'
        required: true
        type: string

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            mlops_pipeline/requirements-evaluate.txt
            mlops_pipeline/requirements-convert.txt

      - name: Cache DVC data
        uses: actions/cache@v4
        with:
          path: data
          key: dvc-${{ inputs.leaf_type }}-${{ hashFiles(format('data_{0}.dvc', inputs.leaf_type)) }}
          restore-keys: |
            dvc-${{ inputs.leaf_type }}-

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install dvc dvc-gdrive
          pip install -r mlops_pipeline/requirements-evaluate.txt
          pip install torch==2.4.1 torchvision==0.19.1 --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Pull DVC test data
        run: |
          DATA_DIR="data/${{ inputs.leaf_type }}"
          if [ -d "$DATA_DIR" ] && [ "$(find "$DATA_DIR" -type f | wc -l)" -gt 10 ]; then
            echo "[CACHE HIT] Test data already present: $(find "$DATA_DIR" -type f | wc -l) files"
          else
            echo "[CACHE MISS] Pulling test data via DVC..."
            dvc remote modify gdrive gdrive_use_service_account true
            DVC_FILE="data_${{ inputs.leaf_type }}.dvc"
            if [ ! -f "$DVC_FILE" ]; then
              echo "[ERROR] DVC file not found: $DVC_FILE"
              ls -la *.dvc 2>/dev/null || echo "No .dvc files at root"
              exit 1
            fi
            echo "Found DVC file: $DVC_FILE"
            for attempt in 1 2 3; do
              echo "DVC pull attempt $attempt/3..."
              if dvc pull "$DVC_FILE"; then
                echo "DVC pull succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "[ERROR] DVC pull failed after 3 attempts"
                exit 1
              fi
              echo "Retrying in 10s..."
              sleep 10
            done
          fi
          echo "Test data: $(find data/${{ inputs.leaf_type }} -type f | wc -l) files"
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Download .pth checkpoint
        run: |
          mkdir -p model_checkpoints_student
          PTH_FILE="model_checkpoints_student/${{ inputs.leaf_type }}_student.pth"
          MODEL_URL="${{ inputs.model_url }}"
          echo "Model URL: $MODEL_URL"

          # If URL points to .tflite (from previous pipeline run), find the .pth checkpoint instead
          if echo "$MODEL_URL" | grep -q '\.tflite'; then
            echo "URL points to .tflite — looking for checkpoint .pth in same folder..."
            # Derive .pth URL from convention: <leaf>_v<ver>_checkpoint.pth
            PTH_URL=$(echo "$MODEL_URL" | sed 's|/[^/]*\.tflite$|/|')
            PTH_URL="${PTH_URL}${{ inputs.leaf_type }}_v${{ inputs.version }}_checkpoint.pth"
            echo "Derived .pth URL: $PTH_URL"
            MODEL_URL="$PTH_URL"
          fi

          # Extract storage path and download with auth
          STORAGE_PATH=$(echo "$MODEL_URL" | grep -oP 'storage/v1/object/public/\K.*' || echo "")
          if [ -z "$STORAGE_PATH" ]; then
            echo "[ERROR] Could not parse storage path from URL: $MODEL_URL"
            exit 1
          fi

          # Try public URL first (faster), fall back to authenticated
          HTTP_CODE=$(curl -sL --compressed -w "%{http_code}" -o "$PTH_FILE" "$MODEL_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Public download failed ($HTTP_CODE), trying authenticated..."
            AUTH_URL="$SUPABASE_URL/storage/v1/object/authenticated/$STORAGE_PATH"
            HTTP_CODE=$(curl -sL --compressed -w "%{http_code}" -o "$PTH_FILE" \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$AUTH_URL")
          fi
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "[ERROR] Download failed with HTTP $HTTP_CODE"
            cat "$PTH_FILE" 2>/dev/null | head -5
            exit 1
          fi

          FILE_SIZE=$(stat --format=%s "$PTH_FILE")
          echo "Downloaded: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "[ERROR] File too small ($FILE_SIZE bytes), likely not a valid checkpoint"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 'Convert PTH → ONNX'
        run: python mlops_pipeline/scripts/convert_pth_to_onnx.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: 'Convert ONNX → TFLite'
        run: python mlops_pipeline/scripts/convert_onnx_to_tflite.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: 'Cross-format validation'
        run: python mlops_pipeline/scripts/validate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json
        continue-on-error: true

      - name: 'Full evaluation on real test data'
        run: |
          DATA_DIR="data/${{ inputs.leaf_type }}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "[ERROR] Test data not found at $DATA_DIR"
            exit 1
          fi
          echo "Test data: $(ls "$DATA_DIR" | wc -l) class folders"
          python mlops_pipeline/scripts/evaluate_models.py --config mlops_pipeline/configs/${{ inputs.leaf_type }}.json

      - name: Compute SHA-256 of TFLite models
        id: sha256
        run: |
          BASE="models/${{ inputs.leaf_type }}/${{ inputs.leaf_type }}_student"
          for VARIANT in float16 float32; do
            TFLITE_PATH="${BASE}_${VARIANT}.tflite"
            if [ -f "$TFLITE_PATH" ]; then
              HASH=$(sha256sum "$TFLITE_PATH" | awk '{print $1}')
              SIZE_MB=$(python3 -c "import os; print(f'{os.path.getsize(\"$TFLITE_PATH\") / 1048576:.3f}')")
              echo "hash_${VARIANT}=$HASH" >> "$GITHUB_OUTPUT"
              echo "size_mb_${VARIANT}=$SIZE_MB" >> "$GITHUB_OUTPUT"
              echo "[OK] ${VARIANT} SHA-256: $HASH  Size: ${SIZE_MB} MB"
            else
              echo "[WARN] TFLite ${VARIANT} not found: $TFLITE_PATH"
              echo "hash_${VARIANT}=" >> "$GITHUB_OUTPUT"
              echo "size_mb_${VARIANT}=" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Upload results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEAF_TYPE: ${{ inputs.leaf_type }}
          VERSION: ${{ inputs.version }}
          TFLITE_FLOAT16_SHA256: ${{ steps.sha256.outputs.hash_float16 }}
          TFLITE_FLOAT32_SHA256: ${{ steps.sha256.outputs.hash_float32 }}
        run: python .github/scripts/upload_benchmarks.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-${{ inputs.leaf_type }}-v${{ inputs.version }}
          path: models/${{ inputs.leaf_type }}/
