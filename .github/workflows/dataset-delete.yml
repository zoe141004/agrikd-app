name: Dataset Delete

on:
  workflow_dispatch:
    inputs:
      leaf_type:
        description: 'Leaf type to delete (e.g. tomato, potato_dataset)'
        required: true
        type: string
      dvc_operation_id:
        description: 'DVC operation ID for status tracking'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: dvc-delete-${{ inputs.leaf_type }}
  cancel-in-progress: false

jobs:
  dataset-delete:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LEAF_TYPE: ${{ inputs.leaf_type }}
      DVC_OP_ID: ${{ inputs.dvc_operation_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install dvc dvc-gs

      - name: Setup GCS credentials
        run: |
          set -eo pipefail
          echo "$GOOGLE_APPLICATION_CREDENTIALS_DATA" > /tmp/gcs-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-sa.json" >> $GITHUB_ENV
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}

      - name: Report status — deleting
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --max-time 30 --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"deleting\",\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Locate and remove DVC tracking
        id: dvc_remove
        run: |
          set -eo pipefail
          DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"

          if [ ! -f "$DVC_FILE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "[WARN] DVC file not found: $DVC_FILE"
            echo "Available .dvc files:"
            ls -la dvc/*.dvc 2>/dev/null || echo "  (none)"
            echo "Skipping DVC remove — file may have been deleted in a previous run."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "=== DVC file contents ==="
          cat "$DVC_FILE"

          # Extract MD5 hash before removal (for verification later)
          MD5_HASH=$(grep -oP '(?<=md5: )\S+' "$DVC_FILE" || true)
          echo "md5=$MD5_HASH" >> "$GITHUB_OUTPUT"
          echo "Extracted MD5 hash: $MD5_HASH"

          # Remove DVC tracking (.dvc file + local cache + gitignore entry)
          echo "=== Removing DVC tracking for ${LEAF_TYPE} ==="
          dvc remove "$DVC_FILE" -v
          echo "DVC remove completed"

      - name: Delete data from DVC remote (GCS)
        if: steps.dvc_remove.outputs.found == 'true'
        continue-on-error: true
        run: |
          echo "=== Garbage-collecting deleted dataset from GCS remote ==="
          # dvc gc --cloud --workspace removes all cache files from the remote
          # that are NOT referenced by any .dvc file in the current workspace.
          # Since we just removed the .dvc file, this dataset's data will be cleaned.
          if dvc gc --cloud --workspace -f -v 2>&1; then
            echo "Remote garbage collection completed successfully"
          else
            echo "[WARN] dvc gc --cloud failed — remote data may need manual cleanup"
            echo "Run manually: gsutil -m rm -r gs://agrikd-dvc-data/data/<hash>"
          fi

      - name: Clean local data directory
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          if [ -d "$DATA_DIR" ]; then
            echo "Removing local data directory: $DATA_DIR"
            rm -rf "$DATA_DIR"
          fi

      - name: Commit and push deletion
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"
          DATA_DIR="data/${LEAF_TYPE}"

          # Stage all changes (deleted .dvc file, .gitignore changes, data dir)
          git add -A "$DVC_FILE" 2>/dev/null || true
          [ -f "data/.gitignore" ] && git add "data/.gitignore"
          [ -d "$DATA_DIR" ] || git rm -r --cached "$DATA_DIR" 2>/dev/null || true
          git add -A

          if git diff --cached --quiet; then
            echo "No tracked changes to commit (DVC file may already have been removed)"
          else
            git commit \
              -m "Remove dataset: ${LEAF_TYPE}" \
              -m "Deleted DVC tracking and remote data for ${LEAF_TYPE}. Triggered from admin dashboard."

            PUSH_OK=false
            for attempt in 1 2 3; do
              if git push; then
                PUSH_OK=true
                break
              fi
              echo "[Retry $attempt/3] git push failed, pulling and retrying..."
              git pull --rebase
              sleep 5
            done

            if [ "$PUSH_OK" = false ]; then
              echo "::error::Git push failed after 3 attempts"
              exit 1
            fi
          fi

      - name: Cleanup GCS credentials
        if: always()
        run: |
          rm -f /tmp/gcs-sa.json ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock

      - name: Report status — completed
        if: inputs.dvc_operation_id != '' && success()
        continue-on-error: true
        run: |
          curl -sS --max-time 30 --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"completed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"metadata\":{\"deleted\":true,\"leaf_type\":\"$LEAF_TYPE\",\"remote_cleaned\":true}}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --max-time 30 --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"Dataset deletion failed — check GitHub Actions logs for run ${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "## Dataset Deletion" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Leaf Type | \`${LEAF_TYPE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DVC File | \`dvc/data_${LEAF_TYPE}.dvc\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Found | ${{ steps.dvc_remove.outputs.found || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MD5 Hash | \`${{ steps.dvc_remove.outputs.md5 || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
