name: DVC Push
on:
  workflow_dispatch:

jobs:
  dvc-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install dvc dvc-gdrive

      - name: DVC Push
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          echo "Pulling DVC cache to verify remote sync..."
          dvc pull || echo "No DVC files to pull (new repo or empty tracking)"
          echo "Pushing to DVC remote..."
          dvc push -v
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
