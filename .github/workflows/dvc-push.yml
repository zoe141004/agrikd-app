name: DVC Push
on:
  workflow_dispatch:
    inputs:
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

jobs:
  dvc-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install dvc dvc-gdrive

      - name: Report status — pushing
        if: inputs.dvc_operation_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"pushing\",\"github_run_id\":${{ github.run_id }},\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: DVC Push
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          echo "Pulling DVC cache to verify remote sync..."
          dvc pull || echo "No DVC files to pull (new repo or empty tracking)"
          echo "Pushing to DVC remote..."
          dvc push -v
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}

      - name: Report status — completed
        if: inputs.dvc_operation_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"completed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        run: |
          curl -sf -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"DVC push failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
