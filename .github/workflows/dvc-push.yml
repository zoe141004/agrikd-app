name: DVC Push
on:
  workflow_dispatch:
    inputs:
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: dvc-push
  cancel-in-progress: false

jobs:
  dvc-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'

      - name: Install DVC
        run: pip install "dvc>=3,<4" "dvc-gs>=3,<4"

      - name: Setup GCS credentials
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_DATA" > /tmp/gcs-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-sa.json" >> $GITHUB_ENV
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}

      - name: Report status — pushing
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"pushing\",\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: DVC Push
        run: |
          echo "Pushing tracked data to DVC remote..."
          dvc push -v

      - name: Cleanup GCS credentials
        if: always()
        run: |
          rm -f /tmp/gcs-sa.json ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock

      - name: Report status — completed
        if: inputs.dvc_operation_id != '' && success()
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"completed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"DVC push failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
