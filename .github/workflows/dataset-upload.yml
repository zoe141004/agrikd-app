name: Dataset Upload

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Upload source: gdrive, kaggle, or predictions'
        required: true
        type: string
      leaf_type:
        description: 'Leaf type identifier (e.g. mango, cassava_leaf)'
        required: true
        type: string
      gdrive_url:
        description: 'Google Drive share URL (for gdrive source)'
        required: false
        type: string
      kaggle_url:
        description: 'Kaggle dataset URL (for kaggle source)'
        required: false
        type: string
      display_name:
        description: 'Human-readable dataset name'
        required: false
        type: string
      confidence_threshold:
        description: 'Min confidence for predictions export (default 0.8)'
        required: false
        type: string
        default: '0.8'
      dvc_operation_id:
        description: 'DVC operation ID for status tracking (from dvc_operations table)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: dvc-${{ inputs.leaf_type || 'all' }}
  cancel-in-progress: false

jobs:
  upload-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install dvc dvc-gs gdown kaggle

      - name: Setup GCS credentials
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_DATA" > /tmp/gcs-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-sa.json" >> $GITHUB_ENV
        env:
          GOOGLE_APPLICATION_CREDENTIALS_DATA: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_DATA }}

      # ── Report status: staging ──────────────────────────────────────────
      - name: Report status — staging
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"staging\",\"github_run_id\":\"${{ github.run_id }}\",\"github_run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      # ── Download from source ────────────────────────────────────────────
      - name: Download from Google Drive
        if: inputs.source == 'gdrive'
        run: |
          echo "=== Downloading ZIP from Google Drive ==="
          mkdir -p /tmp/dataset_download
          python -c "
          import gdown, sys, re, os
          url = os.environ['GDRIVE_URL']
          # Extract file ID from various Google Drive URL formats
          m = re.search(r'/d/([a-zA-Z0-9_-]+)', url) or re.search(r'id=([a-zA-Z0-9_-]+)', url)
          if not m:
              print(f'[ERROR] Cannot extract file ID from URL: {url}')
              sys.exit(1)
          file_id = m.group(1)
          print(f'File ID: {file_id}')
          gdown.download(id=file_id, output='/tmp/dataset_download/dataset.zip', quiet=False)
          "
        env:
          GDRIVE_URL: ${{ inputs.gdrive_url }}

      - name: Export predictions dataset
        if: inputs.source == 'predictions'
        run: |
          python .github/scripts/export_predictions_to_dataset.py \
            --leaf-type "$LEAF_TYPE" \
            --confidence "$CONFIDENCE" \
            --output-dir "data/${LEAF_TYPE}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LEAF_TYPE: ${{ inputs.leaf_type }}
          CONFIDENCE: ${{ inputs.confidence_threshold }}

      - name: Download from Kaggle
        if: inputs.source == 'kaggle'
        run: |
          echo "=== Downloading dataset from Kaggle ==="
          SLUG=$(echo "$KAGGLE_URL" | sed 's|.*/datasets/||' | sed 's|/$||')
          if [ -z "$SLUG" ]; then
            echo "[ERROR] Cannot extract dataset slug from URL: $KAGGLE_URL"
            exit 1
          fi
          echo "Dataset slug: $SLUG"
          mkdir -p /tmp/dataset_download
          kaggle datasets download -d "$SLUG" -p /tmp/dataset_download --unzip
          echo "=== Downloaded files ==="
          ls -la /tmp/dataset_download/
        env:
          KAGGLE_URL: ${{ inputs.kaggle_url }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      # ── Prepare dataset ─────────────────────────────────────────────────
      - name: Prepare dataset (Google Drive)
        if: inputs.source == 'gdrive'
        run: |
          python .github/scripts/prepare_dataset.py \
            --zip /tmp/dataset_download/dataset.zip \
            --leaf-type "$LEAF_TYPE" \
            --display-name "$DISPLAY_NAME"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}
          DISPLAY_NAME: ${{ inputs.display_name || inputs.leaf_type }}

      - name: Prepare dataset (Kaggle)
        if: inputs.source == 'kaggle'
        run: |
          echo "=== Preparing Kaggle dataset ==="
          DATA_DIR="data/${LEAF_TYPE}"
          mkdir -p "$DATA_DIR"
          DOWNLOAD_DIR="/tmp/dataset_download"
          SUBDIRS=$(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)
          FILES=$(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type f | wc -l)
          if [ "$SUBDIRS" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            SINGLE_DIR=$(find "$DOWNLOAD_DIR" -mindepth 1 -maxdepth 1 -type d)
            cp -r "$SINGLE_DIR"/* "$DATA_DIR/" 2>/dev/null || true
          else
            cp -r "$DOWNLOAD_DIR"/* "$DATA_DIR/" 2>/dev/null || true
          fi
          echo "Contents of $DATA_DIR:"
          ls -la "$DATA_DIR/"

          CONFIG="mlops_pipeline/configs/${LEAF_TYPE}.json"
          if [ ! -f "$CONFIG" ]; then
            echo "Generating config for ${LEAF_TYPE}..."
            python -c "
          import json, os
          leaf = os.environ['LEAF_TYPE']
          display = os.environ.get('DISPLAY_NAME', leaf)
          data_dir = f'data/{leaf}'
          classes = sorted([d for d in os.listdir(data_dir) if os.path.isdir(os.path.join(data_dir, d))])
          class_map = {
              str(i): {
                  'name': folder.replace('___', '_').replace('__', '_'),
                  'folder_name': folder,
                  'display_name': folder.replace('___', '_').replace('__', '_').replace('_', ' ').title(),
                  'description': f'Class: {folder.replace(\"___\", \"_\").replace(\"__\", \"_\")}'
              }
              for i, folder in enumerate(classes)
          }
          config = {
              'leaf_type': leaf,
              'display_name': display,
              'input_size': [224, 224],
              'input_channels': 3,
              'checkpoint_filename': f'{leaf}_student.pth',
              'data_dir': data_dir,
              'num_classes': len(classes),
              'class_mapping_note': 'Class indices follow ImageFolder alphabetical sort of folder names (training convention).',
              'classes': class_map,
              'class_names': classes,
              'normalization': {
                  'mean': [0.485, 0.456, 0.406],
                  'std': [0.229, 0.224, 0.225]
              }
          }
          os.makedirs('mlops_pipeline/configs', exist_ok=True)
          with open(f'mlops_pipeline/configs/{leaf}.json', 'w') as f:
              json.dump(config, f, indent=2)
          print(f'Config generated: {len(classes)} classes')
          "
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}
          DISPLAY_NAME: ${{ inputs.display_name || inputs.leaf_type }}

      # ── Verify ──────────────────────────────────────────────────────────
      - name: Verify dataset structure
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "[ERROR] Dataset directory not found: $DATA_DIR"
            exit 1
          fi
          echo "=== Dataset Structure ==="
          echo "Directory: $DATA_DIR"
          echo "Classes:"
          for cls in "$DATA_DIR"/*/; do
            if [ -d "$cls" ]; then
              name=$(basename "$cls")
              count=$(find "$cls" -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.bmp" -o -name "*.webp" \) | wc -l)
              echo "  $name: $count images"
            fi
          done
          total=$(find "$DATA_DIR" -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.bmp" -o -name "*.webp" \) | wc -l)
          echo "Total: $total images"
          if [ "$total" -eq 0 ]; then
            echo "[ERROR] No image files found in dataset"
            exit 1
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Verify config exists
        run: |
          CONFIG="mlops_pipeline/configs/${LEAF_TYPE}.json"
          if [ ! -f "$CONFIG" ]; then
            echo "[ERROR] Config not generated: $CONFIG"
            exit 1
          fi
          echo "=== Config ==="
          cat "$CONFIG"
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      # ── DVC add and push ────────────────────────────────────────────────
      - name: Report status — pushing
        if: inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status":"pushing"}'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: DVC add and push
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"

          # DVC 3.x creates .dvc next to tracked dir: data/${LEAF_TYPE}.dvc
          # Move to dvc/ folder and fix internal path to use ../data/ prefix
          dvc add "$DATA_DIR"
          mkdir -p dvc
          DVC_CREATED="data/${LEAF_TYPE}.dvc"
          if [ -f "$DVC_CREATED" ] && [ "$DVC_CREATED" != "$DVC_FILE" ]; then
            mv "$DVC_CREATED" "$DVC_FILE"
            # Fix path: DVC wrote "path: LEAF_TYPE", needs "path: ../data/LEAF_TYPE"
            sed -i "s|path: ${LEAF_TYPE}$|path: ../data/${LEAF_TYPE}|" "$DVC_FILE"
          fi
          echo "=== DVC file ==="
          cat "$DVC_FILE"

          # Push data to GCS remote
          for attempt in 1 2 3; do
            echo "DVC push attempt $attempt/3..."
            if dvc push "$DVC_FILE" -v; then
              echo "DVC push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "[ERROR] DVC push failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}

      - name: Cleanup GCS credentials
        if: always()
        run: |
          rm -f /tmp/gcs-sa.json ~/.config/dvc/config .dvc/config.local .dvc/tmp/lock

      - name: Commit DVC tracking files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DVC_FILE="dvc/data_${LEAF_TYPE}.dvc"
          CONFIG="mlops_pipeline/configs/${LEAF_TYPE}.json"
          GITIGNORE="data/${LEAF_TYPE}/.gitignore"

          git add "$DVC_FILE" "$CONFIG"
          [ -f "$GITIGNORE" ] && git add "$GITIGNORE"
          [ -f "data/.gitignore" ] && git add "data/.gitignore"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add dataset: ${LEAF_TYPE} via ${SOURCE}"
            PUSH_OK=false
            for attempt in 1 2 3; do
              if git push; then
                PUSH_OK=true
                break
              fi
              echo "[Retry $attempt/3] git push failed, pulling and retrying..."
              git pull --rebase
              sleep 5
            done
            if [ "$PUSH_OK" = false ]; then
              echo "::error::Git push failed after 3 attempts"
              exit 1
            fi
          fi
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}
          SOURCE: ${{ inputs.source }}

      # ── Report status: completed ────────────────────────────────────────
      - name: Report status — completed
        if: inputs.dvc_operation_id != '' && success()
        continue-on-error: true
        run: |
          python3 -c "
          import json, os, glob

          leaf = os.environ['LEAF_TYPE']
          data_dir = f'data/{leaf}'
          classes = {}
          total_files = 0
          total_size = 0

          for cls_dir in sorted(glob.glob(os.path.join(data_dir, '*/'))):
              if not os.path.isdir(cls_dir):
                  continue
              cls_name = os.path.basename(cls_dir.rstrip('/'))
              imgs = [f for f in os.listdir(cls_dir)
                      if f.lower().endswith(('.jpg','.jpeg','.png','.bmp','.webp','.tiff'))]
              cls_size = sum(os.path.getsize(os.path.join(cls_dir, f)) for f in imgs)
              classes[cls_name] = {'count': len(imgs), 'size': cls_size}
              total_files += len(imgs)
              total_size += cls_size

          dvc_file = f'dvc/data_{leaf}.dvc'
          dvc_md5 = ''
          if os.path.exists(dvc_file):
              with open(dvc_file) as f:
                  for line in f:
                      if line.strip().startswith('md5:'):
                          dvc_md5 = line.strip().split(':', 1)[1].strip()
                          break

          metadata = {
              'file_count': total_files,
              'total_size': total_size,
              'num_classes': len(classes),
              'classes': classes,
              'dvc_file': dvc_file,
              'dvc_md5': dvc_md5,
              'datasets': {leaf: {
                  'file_count': total_files,
                  'total_size': total_size,
                  'num_classes': len(classes),
                  'classes': classes,
                  'dvc_md5': dvc_md5
              }}
          }
          with open('/tmp/metadata.json', 'w') as f:
              json.dump(metadata, f)
          "

          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(python3 -c "
          import json
          m = json.load(open('/tmp/metadata.json'))
          print(json.dumps({'status':'completed','completed_at':'$COMPLETED_AT','metadata':m}))
          ")
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$PAYLOAD"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}
          LEAF_TYPE: ${{ inputs.leaf_type }}

      # ── Report status: failed ───────────────────────────────────────────
      - name: Report status — failed
        if: failure() && inputs.dvc_operation_id != ''
        continue-on-error: true
        run: |
          curl -sS --fail-with-body -X PATCH \
            "$SUPABASE_URL/rest/v1/dvc_operations?id=eq.$DVC_OP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\":\"failed\",\"completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"error_message\":\"Dataset upload failed — check GitHub Actions logs\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DVC_OP_ID: ${{ inputs.dvc_operation_id }}

      - name: Summary
        run: |
          DATA_DIR="data/${LEAF_TYPE}"
          total=$(find "$DATA_DIR" -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" -o -name "*.bmp" -o -name "*.webp" \) | wc -l)
          classes=$(ls -d "$DATA_DIR"/*/ 2>/dev/null | wc -l)
          size=$(du -sh "$DATA_DIR" | cut -f1)

          echo "## Dataset Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Leaf Type | \`${LEAF_TYPE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Source | ${SOURCE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Classes | $classes |" >> $GITHUB_STEP_SUMMARY
          echo "| Images | $total |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $size |" >> $GITHUB_STEP_SUMMARY
        env:
          LEAF_TYPE: ${{ inputs.leaf_type }}
          SOURCE: ${{ inputs.source }}
