name: AgriKD CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # ── Stage 0: Dependency Audit ──
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Audit npm dependencies
        working-directory: admin-dashboard
        run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Audit pip dependencies
        working-directory: mlops_pipeline
        run: |
          pip install pip-audit --quiet
          pip-audit -r requirements.txt --desc || echo "::warning::pip-audit found vulnerabilities"

  # ── Stage 1: Lint & Static Analysis ──
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Run flutter analyze
        run: |
          touch .env
          flutter analyze

  # ── Stage 2: Unit & Widget Tests ──
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install SQLite dev library
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
        working-directory: .

      - name: Run tests
        run: |
          touch .env
          flutter test --exclude-tags=widget

  # ── Stage 3: Build APK ──
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          # Strip .env from assets to prevent key leakage in release APK
          sed -i '/- \.env$/d' pubspec.yaml
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: agrikd-release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v7
        with:
          name: debug-symbols
          path: mobile_app/build/debug-info/
          retention-days: 90

  # ── Stage 4: Dashboard Tests ──
  dashboard-test:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run --reporter=verbose

  # ── Stage 5: Jetson Python Lint ──
  jetson-lint:
    name: Jetson Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Jetson code
        run: ruff check jetson/app/ jetson/scripts/
