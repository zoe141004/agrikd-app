name: Deploy
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set. Set it in GitHub repo settings."
            echo "Get your deploy hook URL from Vercel Dashboard → Project → Settings → Git → Deploy Hooks"
            exit 1
          fi
          echo "::add-mask::$VERCEL_DEPLOY_HOOK"
          curl -sf --max-time 30 -X POST "$VERCEL_DEPLOY_HOOK" || { echo "::error::Deploy hook failed"; exit 1; }
          echo "Deploy hook triggered successfully"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
