name: app
description: "AgriKD - Plant Leaf Disease Recognition using Knowledge Distillation"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # ML Inference
  tflite_flutter: ^0.12.1

  # Camera & Image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.3.0

  # Networking & Sync
  connectivity_plus: ^6.1.0

  # Auth
  google_sign_in: ^6.2.1

  # Backend
  supabase_flutter: ^2.9.0
  shared_preferences: ^2.5.5

  # Security
  crypto: ^3.0.6
  path_provider: ^2.1.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.9
  fl_chart: ^0.69.2
  intl: ^0.19.0
  sqflite_common_ffi_web: ^1.1.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Error Tracking
  sentry_flutter: ^9.16.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/tomato/tomato_student.tflite
    - assets/models/burmese_grape_leaf/burmese_grape_leaf_student.tflite
